---
# Template — fill in your values and apply with:
#   kubectl apply -f kubernetes/secret.yaml
#
# Or use a secrets manager (Vault, Sealed Secrets, External Secrets Operator)
# to inject the secret. Do NOT commit real credentials to version control.
#
apiVersion: v1
kind: Secret
metadata:
  name: gpu-monitor-secrets
  namespace: gpu-monitor
type: Opaque
stringData:
  # Set whichever channels you use — others can be omitted
  SLACK_WEBHOOK_URL: ""
  DISCORD_WEBHOOK_URL: ""
  TELEGRAM_BOT_TOKEN: ""
  TELEGRAM_CHAT_ID: ""
  NTFY_URL: ""
  ALERT_WEBHOOK_URL: ""
