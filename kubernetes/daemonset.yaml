---
# gpu-monitor DaemonSet — deploy to every GPU node in your cluster
# https://github.com/reacher-z/gpu-monitor
#
# Usage:
#   kubectl apply -k kubernetes/
#
# Requirements:
#   - NVIDIA device plugin installed on each node
#   - Nodes labeled with nvidia.com/gpu: "true" (or adjust nodeSelector)
#
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-monitor
  namespace: gpu-monitor
  labels:
    app: gpu-monitor
    app.kubernetes.io/name: gpu-monitor
    app.kubernetes.io/version: "0.3.0"
spec:
  selector:
    matchLabels:
      app: gpu-monitor
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gpu-monitor
      annotations:
        # Prometheus auto-discovery
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Schedule only on GPU nodes
      nodeSelector:
        nvidia.com/gpu: "true"
      # Tolerate GPU node taints
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      containers:
        - name: gpu-monitor
          image: ghcr.io/reacher-z/gpu-monitor:latest
          imagePullPolicy: Always

          env:
            # Web dashboard + Prometheus /metrics endpoint
            - name: WEB_PORT
              value: "8080"

            # Use the node name as hostname for multi-node visibility
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

            # Notification channels — load from Secret (see secret.yaml)
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: SLACK_WEBHOOK_URL
                  optional: true
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: DISCORD_WEBHOOK_URL
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: TELEGRAM_BOT_TOKEN
                  optional: true
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: TELEGRAM_CHAT_ID
                  optional: true
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: NTFY_URL
                  optional: true
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: gpu-monitor-secrets
                  key: ALERT_WEBHOOK_URL
                  optional: true

            # Alerting thresholds
            - name: IDLE_THRESHOLD
              value: "10"
            - name: IDLE_MINUTES
              value: "5"
            - name: GPU_TEMP_WARN
              value: "85"
            - name: GPU_TEMP_CRIT
              value: "92"

          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP

          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

          # Mount host /proc for process username lookup
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true

          livenessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

      volumes:
        - name: proc
          hostPath:
            path: /proc

      # Required for NVIDIA GPU access
      runtimeClassName: nvidia
