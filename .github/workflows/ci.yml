name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m py_compile gpu_monitor.py
      - name: Import check (stdlib only)
        run: |
          python - <<'EOF'
          # Verify the module imports cleanly without external deps
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location("gpu_monitor", "gpu_monitor.py")
          mod  = importlib.util.module_from_spec(spec)
          # Don't exec (needs nvidia-smi at runtime), just compile
          import py_compile, tempfile
          py_compile.compile("gpu_monitor.py", doraise=True)
          print("OK: compiles cleanly on Python", sys.version)
          EOF
      - name: Check no external dependencies
        run: |
          python - <<'EOF'
          import ast, sys
          with open("gpu_monitor.py") as f:
              tree = ast.parse(f.read())
          stdlib = {
              "argparse","base64","collections","contextlib","datetime","email",
              "functools","hashlib","http","io","itertools","json","logging",
              "os","pathlib","re","signal","smtplib","socket","subprocess",
              "sys","threading","time","typing","urllib","pwd","importlib","py_compile"
          }
          third_party = []
          for node in ast.walk(tree):
              if isinstance(node, (ast.Import, ast.ImportFrom)):
                  names = [a.name for a in node.names] if isinstance(node, ast.Import) else [node.module or ""]
                  for name in names:
                      top = name.split(".")[0]
                      if top and top not in stdlib:
                          third_party.append(top)
          if third_party:
              print("WARNING: possible third-party imports:", set(third_party))
          else:
              print("OK: stdlib-only imports confirmed")
          EOF
