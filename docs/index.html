<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GPU Monitor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Dark theme (default) ────────────────────────────────────────────────── */
:root {
  --bg:#05050f;
  --surface:rgba(255,255,255,.028);
  --surface2:rgba(255,255,255,.055);
  --border:rgba(255,255,255,.08);
  --border-h:rgba(255,255,255,.18);
  --text:#dde1f0;
  --muted:#384060;
  --green:#00e676;
  --amber:#ffab40;
  --red:#ff4d6d;
  --blue:#40c8ff;
  --header-bg:rgba(5,5,15,.82);
  --shadow:none;
}

/* ── Light theme ─────────────────────────────────────────────────────────── */
[data-theme="light"] {
  --bg:#eef2ff;
  --surface:#ffffff;
  --surface2:#f3f5ff;
  --border:rgba(0,0,0,.07);
  --border-h:rgba(79,70,229,.3);
  --text:#1e1b4b;
  --muted:#8892b0;
  --green:#059669;
  --amber:#d97706;
  --red:#dc2626;
  --blue:#4f46e5;
  --header-bg:rgba(255,255,255,.88);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 20px rgba(79,70,229,.07);
}

/* ── Body & background ───────────────────────────────────────────────────── */
body {
  color:var(--text);
  font-family:ui-monospace,'SF Mono','Cascadia Code',monospace;
  font-size:13px;
  min-height:100vh;
}

/* Dark: dot grid + dual radial glows (fixed so they don't scroll) */
[data-theme="dark"] body {
  background-color:#05050f;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255,255,255,.03) 1px, transparent 0),
    radial-gradient(ellipse 75vw 55vh at 18% 12%, rgba(0,200,255,.07) 0%, transparent 68%),
    radial-gradient(ellipse 60vw 75vh at 85% 90%, rgba(140,65,255,.06) 0%, transparent 68%);
  background-size:28px 28px,100% 100%,100% 100%;
  background-attachment:scroll,fixed,fixed;
}

/* Light: soft lavender corner blushes */
[data-theme="light"] body {
  background-color:#eef2ff;
  background-image:
    radial-gradient(ellipse 75vw 55vh at 0% 0%, rgba(165,180,252,.35) 0%, transparent 60%),
    radial-gradient(ellipse 60vw 70vh at 100% 100%, rgba(196,181,253,.28) 0%, transparent 60%);
  background-size:100% 100%,100% 100%;
  background-attachment:fixed,fixed;
}

/* ── Smooth theme transitions ────────────────────────────────────────────── */
body,header,.machine,.gpu-cell,.pill,.track,.g-stat,
.machine-header,.gpu-idx-badge,.badge {
  transition:background-color .3s ease,border-color .3s ease,box-shadow .3s ease;
}
.logo span { transition:color .3s ease,text-shadow .3s ease; }
a,span,div,p { transition:color .3s ease; }

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
}

.logo {
  font-size:14px;font-weight:700;letter-spacing:.05em;
  color:var(--text);user-select:none;
}
[data-theme="dark"] .logo span {
  color:#40c8ff;
  text-shadow:0 0 22px rgba(64,200,255,.65);
}
[data-theme="light"] .logo span { color:#4f46e5; }

.spacer{flex:1}

.hdr-btn {
  background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:7px;padding:4px 10px;font-size:11px;
  cursor:pointer;font-family:inherit;
  transition:border-color .2s,color .2s;
}
.hdr-btn:hover{border-color:var(--blue);color:var(--blue)}
#theme-btn{padding:4px 8px;font-size:14px;line-height:1}

#status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.stale{background:var(--amber)}
.dot.err{background:var(--red)}

/* Pulsing online dot in dark mode */
@keyframes pulse-ok {
  0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.55)}
  60%{box-shadow:0 0 0 6px rgba(0,230,118,0)}
}
[data-theme="dark"] .dot:not(.stale):not(.err){
  animation:pulse-ok 2.5s ease-in-out infinite;
}

#clock{color:var(--muted);font-size:11px;margin-left:4px}

/* Countdown ring */
#countdown{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
#countdown svg{transform:rotate(-90deg)}
#cd-track{transition:stroke .3s}
#cd-circle{stroke-dasharray:22;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}

/* ── Global stats strip ──────────────────────────────────────────────────── */
#global-bar {
  display:flex;align-items:stretch;
  margin:14px 20px 0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
}
.g-stat {
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:11px 20px;flex:1;gap:3px;min-width:80px;
}
.g-stat+.g-stat{border-left:1px solid var(--border)}
.g-label{font-size:8px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.g-val{font-size:18px;font-weight:700;line-height:1}

/* ── Machine cards ───────────────────────────────────────────────────────── */
main{padding:14px 20px 32px;display:flex;flex-direction:column;gap:12px}

.machine {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
  transition:border-color .25s,box-shadow .25s,background-color .3s;
}
[data-theme="dark"] .machine:hover{
  border-color:var(--border-h);
  background:rgba(255,255,255,.04);
}
[data-theme="light"] .machine:hover{
  box-shadow:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(79,70,229,.12);
}

.machine-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
[data-theme="dark"] .machine-header{background:rgba(255,255,255,.018)}
[data-theme="light"] .machine-header{background:var(--surface2)}

.machine-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
[data-theme="dark"] .machine-dot{box-shadow:0 0 10px currentColor}

.machine-name{font-weight:700;font-size:13px;letter-spacing:.02em}
.machine-time{color:var(--muted);font-size:10px;margin-left:auto}

.badge{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;padding:2px 8px;border-radius:20px;
}
.badge.online {background:rgba(0,230,118,.13);color:var(--green)}
.badge.stale  {background:rgba(255,171,64,.13);color:var(--amber)}
.badge.offline{background:rgba(255,77,109,.13);color:var(--red)}

/* GPU grid */
.gpu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1px;background:var(--border);
}
.gpu-cell{
  background:var(--surface);
  padding:14px 16px;
}
/* In dark mode, GPU cells use true bg so glass effect is visible on card */
[data-theme="dark"] .gpu-cell{background:#05050f}

.gpu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.gpu-label{font-size:10px;color:var(--muted)}
.gpu-idx-badge{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;
  background:var(--surface2);color:var(--muted);
}

/* Pills */
.pills{display:flex;gap:6px;margin-bottom:10px}
.pill{flex:1;background:var(--surface2);border-radius:9px;padding:7px 6px;text-align:center}
.pill-val{font-size:15px;font-weight:700;line-height:1;margin-bottom:3px}
.pill-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}

/* Bars */
.bar-row{margin-bottom:7px}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:3px;font-size:9px}
.bar-meta .lbl{color:var(--muted)}
.bar-meta .val{color:var(--text);font-weight:600}
.track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.fill{
  height:100%;border-radius:2px;
  transition:width .7s cubic-bezier(.4,0,.2,1),box-shadow .3s ease;
}

/* Fill colors + glow (glow only in dark) */
.fill-green{background:var(--green)}
.fill-amber{background:var(--amber)}
.fill-red  {background:var(--red)}
.fill-blue {background:var(--blue)}

[data-theme="dark"] .fill-green{box-shadow:0 0 10px var(--green)}
[data-theme="dark"] .fill-amber{box-shadow:0 0 10px var(--amber)}
[data-theme="dark"] .fill-red  {box-shadow:0 0 10px var(--red)}
[data-theme="dark"] .fill-blue {box-shadow:0 0 10px var(--blue)}

/* Procs */
.procs{margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.proc{display:flex;justify-content:space-between;padding:2px 0;font-size:10px;gap:6px}
.proc-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--text)}
.proc-mem{color:var(--muted);white-space:nowrap}
.no-proc{color:var(--muted);font-size:10px;font-style:italic}

/* Loading / error */
.loader{display:flex;align-items:center;justify-content:center;gap:10px;padding:80px 0;color:var(--muted)}
.spinner{
  width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{color:var(--red);text-align:center;padding:60px 20px;font-size:12px;line-height:1.8}
</style>
</head>
<body>
<header>
  <div class="logo">◈ gpu<span>monitor</span></div>
  <span class="spacer"></span>
  <div id="countdown">
    <svg width="14" height="14" viewBox="0 0 14 14">
      <circle id="cd-track" cx="7" cy="7" r="3.5" fill="none" stroke-width="2.5"/>
      <circle id="cd-circle" cx="7" cy="7" r="3.5" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span id="cd-text">30s</span>
  </div>
  <button class="hdr-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
  <button class="hdr-btn" onclick="load()">↻ Refresh</button>
  <div id="status"><span class="dot" id="dot"></span><span id="status-text">loading…</span></div>
  <span id="clock"></span>
</header>

<div id="global-bar" style="display:none">
  <div class="g-stat"><div class="g-val" id="g-machines">—</div><div class="g-label">Machines</div></div>
  <div class="g-stat"><div class="g-val" id="g-gpus">—</div><div class="g-label">Total GPUs</div></div>
  <div class="g-stat"><div class="g-val" id="g-util">—</div><div class="g-label">Avg Util</div></div>
  <div class="g-stat"><div class="g-val" id="g-mem">—</div><div class="g-label">Memory</div></div>
  <div class="g-stat"><div class="g-val" id="g-temp">—</div><div class="g-label">Avg Temp</div></div>
  <div class="g-stat"><div class="g-val" id="g-procs">—</div><div class="g-label">Processes</div></div>
</div>

<main id="main"><div class="loader"><div class="spinner"></div>Loading…</div></main>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const DATA_BASE   = './data';
const REFRESH_SEC = 30;
const STALE_SEC   = 120;
const OFFLINE_SEC = 300;

// ── Theme ────────────────────────────────────────────────────────────────────
const html    = document.documentElement;
const themBtn = document.getElementById('theme-btn');
const cdTrack = document.getElementById('cd-track');

function applyTheme(t) {
  html.setAttribute('data-theme', t);
  themBtn.textContent = t === 'dark' ? '☀' : '☾';
  cdTrack.setAttribute('stroke', t === 'dark'
    ? 'rgba(255,255,255,.12)' : 'rgba(0,0,0,.1)');
  localStorage.setItem('theme', t);
}
function toggleTheme() {
  applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}
// Init: localStorage → OS preference → dark
(function() {
  const s = localStorage.getItem('theme');
  if (s) { applyTheme(s); return; }
  applyTheme(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();

// ── Color helpers ─────────────────────────────────────────────────────────────
const utilCls = p => p < 40 ? 'green' : p < 70 ? 'amber' : 'red';
const memCls  = p => p < 60 ? 'blue'  : p < 80 ? 'amber' : 'red';
const tempCls = t => t < 55 ? 'blue'  : t < 75 ? 'amber' : 'red';
const cv      = n => `var(--${n})`;

function bar(pct, clsFn) {
  const p = Math.min(100, Math.max(0, pct));
  return `<div class="track"><div class="fill fill-${clsFn(p)}" style="width:${p}%"></div></div>`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function relTime(ts) {
  const d = Math.floor(Date.now()/1000) - ts;
  if (d < 5)    return 'just now';
  if (d < 60)   return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return `${Math.floor(d/3600)}h ago`;
}
function machineStatus(ts) {
  const age = Math.floor(Date.now()/1000) - ts;
  if (age < STALE_SEC)   return 'online';
  if (age < OFFLINE_SEC) return 'stale';
  return 'offline';
}

// ── Rendering ────────────────────────────────────────────────────────────────
function renderGpu(g, procs, accent) {
  const mp = g.mem_total ? g.mem_used / g.mem_total * 100 : 0;
  const pl = procs[String(g.idx)] || [];
  const accentFade = accent + '22';
  const procsHtml = pl.length
    ? pl.map(p => `<div class="proc"><span class="proc-name">${esc(p.name)}</span><span class="proc-mem">${p.mem} MiB</span></div>`).join('')
    : '<span class="no-proc">idle</span>';

  return `<div class="gpu-cell">
  <div class="gpu-top">
    <span class="gpu-label">${esc(g.name)}</span>
    <span class="gpu-idx-badge" style="background:${accentFade};color:${accent}">GPU ${g.idx}</span>
  </div>
  <div class="pills">
    <div class="pill">
      <div class="pill-val" style="color:${cv(utilCls(g.util))}">${g.util}%</div>
      <div class="pill-lbl">Util</div>
    </div>
    <div class="pill">
      <div class="pill-val" style="color:${cv(memCls(mp))}">${(g.mem_used/1024).toFixed(1)}G</div>
      <div class="pill-lbl">/ ${(g.mem_total/1024).toFixed(0)}G</div>
    </div>
    <div class="pill">
      <div class="pill-val" style="color:${cv(tempCls(g.temp))}">${g.temp}°</div>
      <div class="pill-lbl">Temp</div>
    </div>
  </div>
  <div class="bar-row">
    <div class="bar-meta"><span class="lbl">Utilization</span><span class="val">${g.util}%</span></div>
    ${bar(g.util, utilCls)}
  </div>
  <div class="bar-row">
    <div class="bar-meta">
      <span class="lbl">Memory</span>
      <span class="val">${(g.mem_used/1024).toFixed(1)} / ${(g.mem_total/1024).toFixed(0)} GiB</span>
    </div>
    ${bar(mp, memCls)}
  </div>
  <div class="procs">${procsHtml}</div>
</div>`;
}

function renderMachine(d) {
  const status  = machineStatus(d.ts);
  const accent  = d.color || '#40c8ff';
  const gpuHtml = d.gpus.map(g => renderGpu(g, d.procs, accent)).join('');
  return `<div class="machine">
  <div class="machine-header" style="border-left:3px solid ${accent}">
    <span class="machine-dot" style="background:${accent};color:${accent}"></span>
    <span class="machine-name">${esc(d.hostname)}</span>
    <span class="badge ${status}">${status}</span>
    <span class="machine-time">updated ${relTime(d.ts)}</span>
  </div>
  <div class="gpu-grid">${gpuHtml || '<div style="padding:16px;color:var(--muted)">No GPUs found</div>'}</div>
</div>`;
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url + '?_=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function load() {
  try {
    const idx      = await fetchJSON(`${DATA_BASE}/index.json`);
    const machines = idx.machines || [];

    if (!machines.length) {
      document.getElementById('main').innerHTML =
        '<div class="err-msg">No machines found.<br>Start gpu_monitor.py with GITHUB_PAGES_REPO set.</div>';
      return;
    }

    const results = await Promise.allSettled(machines.map(h => fetchJSON(`${DATA_BASE}/${h}.json`)));
    const data    = results.filter(r => r.status === 'fulfilled').map(r => r.value).sort((a,b) => b.ts - a.ts);

    const totalGpus    = data.reduce((s,d) => s + d.gpus.length, 0);
    const allUtils     = data.flatMap(d => d.gpus.map(g => g.util));
    const allTemps     = data.flatMap(d => d.gpus.map(g => g.temp));
    const totalMemUsed = data.flatMap(d => d.gpus).reduce((s,g) => s + g.mem_used, 0);
    const totalMemTot  = data.flatMap(d => d.gpus).reduce((s,g) => s + g.mem_total, 0);
    const totalProcs   = data.reduce((s,d) => s + Object.values(d.procs).flat().length, 0);
    const avgUtil      = allUtils.length ? allUtils.reduce((a,b)=>a+b,0)/allUtils.length : 0;
    const avgTemp      = allTemps.length ? allTemps.reduce((a,b)=>a+b,0)/allTemps.length : 0;

    document.getElementById('global-bar').style.display = 'flex';
    document.getElementById('g-machines').textContent = data.length;
    document.getElementById('g-gpus').textContent     = totalGpus;

    const uEl = document.getElementById('g-util');
    uEl.textContent = avgUtil.toFixed(0) + '%';
    uEl.style.color = cv(utilCls(avgUtil));

    document.getElementById('g-mem').textContent = `${(totalMemUsed/1024).toFixed(0)}/${(totalMemTot/1024).toFixed(0)}G`;

    const tEl = document.getElementById('g-temp');
    tEl.textContent = avgTemp.toFixed(0) + '°C';
    tEl.style.color = cv(tempCls(avgTemp));

    document.getElementById('g-procs').textContent  = totalProcs;
    document.getElementById('main').innerHTML        = data.map(renderMachine).join('');
    document.getElementById('dot').className         = 'dot';
    document.getElementById('status-text').textContent = `${data.length} machine${data.length!==1?'s':''}`;

  } catch(e) {
    document.getElementById('dot').className = 'dot err';
    document.getElementById('status-text').textContent = 'error';
    document.getElementById('main').innerHTML =
      `<div class="err-msg">Failed to load data.<br><small>${esc(String(e))}</small><br>` +
      `Make sure GitHub Pages is enabled and GITHUB_PAGES_REPO is set in your .env</div>`;
  }
}

// ── Clock & countdown ─────────────────────────────────────────────────────────
let _rem  = REFRESH_SEC;
const _c  = document.getElementById('cd-circle');
const _ct = document.getElementById('cd-text');
const DASH = 22;

setInterval(() => {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleDateString() + ' ' + n.toLocaleTimeString();
  _rem--;
  if (_rem <= 0) { _rem = REFRESH_SEC; load(); }
  _ct.textContent = _rem + 's';
  _c.style.strokeDashoffset = DASH * (1 - _rem / REFRESH_SEC);
}, 1000);

setInterval(() => {
  document.querySelectorAll('[data-ts]').forEach(el => {
    el.textContent = 'updated ' + relTime(+el.dataset.ts);
  });
}, 5000);

load();
</script>
</body>
</html>
